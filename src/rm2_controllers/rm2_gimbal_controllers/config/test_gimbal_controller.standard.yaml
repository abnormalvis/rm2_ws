test_gimbal_controller:
  ros__parameters:
    yaw:
      joint: yaw_motor
      pid:
        p: 0.5
        i: 10.0
        d: 0.0
        i_clamp_max: 3.0
        i_clamp_min: -3.0
      pid_pos:
        p: 3.0
        i: 0.0
        d: 0.0
        i_clamp_max: 1.0
        i_clamp_min: -1.0
      limits:
        max_position: 3.14159
        min_position: -3.14159
        max_velocity: 10.0
        max_effort: 30.0
      parent_link: base_link
      resistance_compensation:
        resistance: 2.0
        error_tolerance: 0.1
      k_chassis_vel: 0.5

    pitch:
      joint: pitch_motor
      pid:
        p: 0.5
        i: 10.0
        d: 0.0
        i_clamp_max: 3.0
        i_clamp_min: -3.0
      pid_pos:
        p: 3.0
        i: 0.0
        d: 0.0
        i_clamp_max: 1.0
        i_clamp_min: -1.0
      limits:
        max_position: 1.5708
        min_position: -1.5708
        max_velocity: 8.0
        max_effort: 25.0
      parent_link: base_link

    feedforward:
      enable: true
      mass_origin:
        x: 0.1
        z: 0.05
      gravity: 9.8

    yaw_k_v: 0.0
    pitch_k_v: 0.0

    chassis_compensation:
      a: 0.0
      b: 1.0
      c: 0.0
      d: 0.0

    accel_pitch: [0.0]
    accel_yaw: [0.0]

    chassis_vel:
      cutoff_frequency: 20.0

    bullet_solver:
      resistance_coff: 0.001
      resistance_coff_qd_10: 0.0008
      resistance_coff_qd_15: 0.0009
      resistance_coff_qd_16: 0.00095
      resistance_coff_qd_18: 0.001
      resistance_coff_qd_30: 0.0015
      g: 9.8
      max_iter: 20

    imu_name: ""
    imu_frame_id: imu_link
    publish_rate: 100.0

test_effort_controller:
  ros__parameters:
    joints:
      - yaw_motor
      - pitch_motor