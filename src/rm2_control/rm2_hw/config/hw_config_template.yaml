/rm2_hw:
  ros__parameters:
    loop_frequency: 1000.0
    cycle_time_error_threshold: 0.001
    thread_priority: 95  
/hw_node:
  ros__parameters:
    bus:
    - can0
    - can1
    thread_priority: 95 
    # Configurations of the actuators
    # actuators: ["right_front_wheel_motor", "left_front_wheel_motor"]
    actuators_names: 
    - right_front_wheel_motor
    actuators:
      right_front_wheel_motor:
        bus: can0
        id: 0x204
        type: rm_3508
        lp_cutoff_frequency: 150.0
